server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lendledger}
    username: ${DB_USER:lendledger}
    password: ${DB_PASSWORD:lendledger}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth
  flyway:
    schemas: auth
    default-schema: auth

lendledger:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-long-secret-key-32chars-min}
  internal-api-key: ${INTERNAL_API_KEY:dev-internal-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info
