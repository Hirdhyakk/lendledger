server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: loan-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lendledger}
    username: ${DB_USER:lendledger}
    password: ${DB_PASSWORD:lendledger}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: loan
  flyway:
    schemas: loan
    default-schema: loan
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

lendledger:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-long-secret-key-32chars-min}
  internal-api-key: ${INTERNAL_API_KEY:dev-internal-key}
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  payment-service-url: ${PAYMENT_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
