server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lendledger}
    username: ${DB_USER:lendledger}
    password: ${DB_PASSWORD:lendledger}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payment
  flyway:
    schemas: payment
    default-schema: payment
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

lendledger:
  internal-api-key: ${INTERNAL_API_KEY:dev-internal-key}
  loan-service-url: ${LOAN_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
